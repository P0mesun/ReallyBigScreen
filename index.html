<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8e8e8;
      padding: 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00f260, #0575e6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .game-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                  0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    canvas {
      display: block;
      background: #1a1a2e;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 12, 41, 0.85);
      backdrop-filter: blur(4px);
      transition: opacity 0.3s;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay h2 {
      font-size: 1.8rem;
      margin-bottom: 12px;
    }

    .overlay p {
      color: #aaa;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.6;
    }

    .overlay .score-display {
      font-size: 1.2rem;
      color: #00f260;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #00f260, #0575e6);
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 242, 96, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .hud {
      display: flex;
      gap: 32px;
      margin-top: 16px;
      font-size: 1.1rem;
    }

    .hud span {
      color: #888;
    }

    .hud strong {
      color: #00f260;
      font-size: 1.3rem;
    }

    .controls-hint {
      margin-top: 16px;
      color: #666;
      font-size: 0.85rem;
    }

    .mobile-controls {
      display: none;
      margin-top: 20px;
      gap: 8px;
    }

    .mobile-controls .row {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .mobile-controls button {
      width: 56px;
      height: 56px;
      padding: 0;
      font-size: 1.4rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    @media (max-width: 600px) {
      .mobile-controls {
        display: flex;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <h1>🐍 贪吃蛇</h1>
  <p class="subtitle">吃掉食物，越长越好 — 别撞墙也别咬到自己！</p>

  <div class="game-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>准备开始</h2>
      <p>使用方向键或 WASD 控制蛇的移动<br>空格键暂停 / 继续</p>
      <button id="startBtn">开始游戏</button>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
      <h2>游戏结束</h2>
      <p class="score-display" id="finalScore"></p>
      <button id="restartBtn">再来一局</button>
    </div>
    <div class="overlay hidden" id="pauseOverlay">
      <h2>已暂停</h2>
      <p>按空格键继续</p>
    </div>
  </div>

  <div class="hud">
    <div>得分：<strong id="score">0</strong></div>
    <div>最高：<strong id="highScore">0</strong></div>
    <div>速度：<strong id="speed">1</strong>x</div>
  </div>

  <p class="controls-hint">方向键 / WASD 移动 · 空格暂停</p>

  <div class="mobile-controls">
    <div class="row">
      <button data-dir="up">▲</button>
    </div>
    <div class="row">
      <button data-dir="left">◀</button>
      <button data-dir="down">▼</button>
      <button data-dir="right">▶</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");
    const speedEl = document.getElementById("speed");
    const startOverlay = document.getElementById("startOverlay");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const pauseOverlay = document.getElementById("pauseOverlay");
    const finalScoreEl = document.getElementById("finalScore");

    let snake, direction, nextDirection, food, score, highScore, gameLoop, paused, gameRunning;
    let tickInterval = 150;

    highScore = parseInt(localStorage.getItem("snakeHighScore") || "0", 10);
    highScoreEl.textContent = highScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      tickInterval = 150;
      paused = false;
      scoreEl.textContent = "0";
      speedEl.textContent = "1";
      spawnFood();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(255,255,255,0.03)";
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * GRID);
        ctx.lineTo(canvas.width, j * GRID);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const r = Math.round(0 + t * 5);
        const g = Math.round(242 - t * 80);
        const b = Math.round(96 + t * 100);
        ctx.fillStyle = i === 0 ? "#00f260" : `rgb(${r},${g},${b})`;

        const pad = i === 0 ? 1 : 2;
        const radius = i === 0 ? 6 : 4;
        roundRect(
          seg.x * GRID + pad,
          seg.y * GRID + pad,
          GRID - pad * 2,
          GRID - pad * 2,
          radius
        );
        ctx.fill();

        if (i === 0) {
          ctx.fillStyle = "#1a1a2e";
          const eyeOffset = direction.x !== 0 ? 3 : 0;
          const eyeY = direction.y === 1 ? 12 : direction.y === -1 ? 6 : 8;
          const eyeX1 = seg.x * GRID + (direction.x === -1 ? 5 : direction.x === 1 ? 13 : 7);
          const eyeX2 = seg.x * GRID + (direction.x === -1 ? 5 : direction.x === 1 ? 13 : 13);
          ctx.beginPath();
          ctx.arc(eyeX1 + eyeOffset, seg.y * GRID + eyeY, 2, 0, Math.PI * 2);
          ctx.arc(eyeX2 + eyeOffset, seg.y * GRID + eyeY, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawFood() {
      const cx = food.x * GRID + GRID / 2;
      const cy = food.y * GRID + GRID / 2;
      const pulse = Math.sin(Date.now() / 200) * 2;

      ctx.fillStyle = "#ff4757";
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2 - 2 + pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#2ed573";
      ctx.beginPath();
      ctx.ellipse(cx + 2, cy - GRID / 2 + 2, 4, 6, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function update() {
      direction = { ...nextDirection };
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y,
      };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame();
        return;
      }

      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem("snakeHighScore", highScore);
        }
        if (score % 5 === 0 && tickInterval > 60) {
          tickInterval -= 10;
          speedEl.textContent = Math.round((150 - tickInterval) / 10 + 1);
          restartLoop();
        }
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    function tick() {
      if (!paused && gameRunning) {
        update();
      }
      render();
    }

    function startGame() {
      initGame();
      gameRunning = true;
      startOverlay.classList.add("hidden");
      gameOverOverlay.classList.add("hidden");
      pauseOverlay.classList.add("hidden");
      restartLoop();
    }

    function endGame() {
      gameRunning = false;
      clearInterval(gameLoop);
      finalScoreEl.textContent = `本次得分：${score}`;
      gameOverOverlay.classList.remove("hidden");
    }

    function restartLoop() {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, tickInterval);
    }

    function togglePause() {
      if (!gameRunning) return;
      paused = !paused;
      pauseOverlay.classList.toggle("hidden", !paused);
    }

    function setDirection(x, y) {
      if (!gameRunning) return;
      if (x === -direction.x && y === -direction.y) return;
      nextDirection = { x, y };
    }

    document.addEventListener("keydown", (e) => {
      switch (e.key) {
        case "ArrowUp":
        case "w":
        case "W":
          e.preventDefault();
          setDirection(0, -1);
          break;
        case "ArrowDown":
        case "s":
        case "S":
          e.preventDefault();
          setDirection(0, 1);
          break;
        case "ArrowLeft":
        case "a":
        case "A":
          e.preventDefault();
          setDirection(-1, 0);
          break;
        case "ArrowRight":
        case "d":
        case "D":
          e.preventDefault();
          setDirection(1, 0);
          break;
        case " ":
          e.preventDefault();
          togglePause();
          break;
      }
    });

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("restartBtn").addEventListener("click", startGame);

    document.querySelectorAll(".mobile-controls button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const dir = btn.dataset.dir;
        const map = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
        const [x, y] = map[dir];
        setDirection(x, y);
      });
    });

    render();
  </script>
</body>
</html>
